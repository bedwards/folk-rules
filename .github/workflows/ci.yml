name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - run: bundle exec rake test
      - run: bundle exec rake spec
      - run: bundle exec standardrb
      - name: Verify example songs
        run: |
          for f in songs/examples/0[1-6]*.rb; do
            echo "=== Verifying $f ==="
            bundle exec exe/fr verify "$f"
          done
          echo "=== Verifying songs/examples/07_folk_country_jam/song.rb ==="
          bundle exec exe/fr verify songs/examples/07_folk_country_jam/song.rb
